# process-pattern-catalog.yaml — процессный TPF IWE
#
# Каталог индексирует паттерны процесса (как агент работает), не дублирует их тела.
# Тело паттерна живёт в CLAUDE.md / distinctions.md / protocol-*.md / .claude/rules/ — этот файл только указывает.
#
# Схема записи:
#   description:      однострочный интент — зачем паттерн существует
#   discoverability:   как агент понимает, что паттерн применим сейчас
#   first_move:        что делать первым
#   exit:               что считается завершением
#   boundary:            когда паттерн НЕ применяется
#   linked_artifact:   список ссылок на реализацию в других каталогах, формат "<catalog>:<id>"; [] если каталог-записи нет
#   source_ref:          текстовые первоисточники (файл + секция) — происхождение, не интеграция

schema_version: 1
wp: WP-N  # заменить при внедрении в конкретный РП

patterns:

  # --- Гейты (точка решения впускать/не впускать) ---

  WPGate:
    description: "Любое задание проходит протокол Открытия до начала работы — предотвращает незапланированную работу."
    discoverability: "Получено новое задание от пилота, либо обнаружена доп. задача >15 мин, создающая артефакт."
    first_move: "Прочитать список РП недели (MEMORY.md), сверить задачу с планом."
    exit: "Задача совпадает с РП в плане, либо новый РП зарегистрирован после явного согласия пилота."
    boundary: "Не применяется к тривиальным вопросам и багфиксам ≤15 мин без создания артефакта."
    linked_artifact:
      - "rules-registry:AR.001"
    source_ref:
      - file: "CLAUDE.md"
        section: "§2 п.1 WP Gate"

  RepoTouchGate:
    description: "Первое содержательное действие в репозитории требует прочитать его CLAUDE.md — иначе легко пропустить локальные обязательные инструкции."
    discoverability: "Первый Read/Edit/commit в репо за сессию, где CLAUDE.md ещё не читался."
    first_move: "Прочитать <repo>/CLAUDE.md."
    exit: "Если найден блок «обязательно загружай» — указанные файлы загружены до ответа."
    boundary: "Не повторяется на каждое действие — один раз на репо за сессию."
    linked_artifact:
      - "rules-registry:AR.010"
    source_ref:
      - file: "CLAUDE.md"
        section: "§2 Pre-action Gates"

  PullOnTouchGate:
    description: "Локальная копия репо может быть устаревшей — pull перед работой предотвращает решения на неактуальных данных."
    discoverability: "Первое обращение к git-репо за сессию (любое — ls/Read/Edit/commit), ещё не синхронизированное."
    first_move: "git status; если чисто — git pull --rebase."
    exit: "Локальная копия синхронизирована с origin, либо явно помечена как potentially stale."
    boundary: "При грязном репо или rebase-конфликте — не разрешать конфликт автоматически: stash или пометка stale."
    linked_artifact:
      - "rules-registry:AR.006"
    source_ref:
      - file: "CLAUDE.md"
        section: "§2 п.4 Pull-on-Touch"

  RoutingGate:
    description: "Перед созданием нового файла-артефакта агент рискует положить его не туда по аналогии с соседним файлом — карта маршрутизации знания снимает этот риск."
    discoverability: "Планируется Write нового файла (не редактирование существующего)."
    first_move: "Открыть карту маршрутизации знания (routing-vocab.md fast-path, при miss — repo-type-rules.md)."
    exit: "Путь размещения файла подтверждён картой, не выбран по аналогии."
    boundary: "Не применяется при редактировании уже существующего файла на известном месте."
    linked_artifact:
      - "rules-registry:AR.009"
    source_ref:
      - file: "MEMORY.md"
        section: "БЛОКИРУЮЩИЕ п.5 Routing Gate"

  ArchGate:
    description: "Архитектурное решение (новый инструмент, системное изменение) оценивается по профилю ЭМОГССБ до реализации."
    discoverability: "Предлагается новый инструмент/агент/системное изменение или конфликтующий архитектурный выбор."
    first_move: "Пройти чеклист ЭМОГССБ (7 характеристик, conjunctive screening)."
    exit: "Профиль зафиксирован (✅/⚠️/❌ по каждой характеристике), решение принято с учётом профиля."
    boundary: "Не применяется к рефакторингу без функциональных изменений или bugfix без изменения внешнего поведения."
    linked_artifact:
      - "rules-registry:AR.003"
      - "skills-catalog:archgate"
    source_ref:
      - file: "CLAUDE.md"
        section: "§5 АрхГейт"

  # --- Проходы (контрольная точка с критерием) ---

  QualityReviewPass:
    description: "Контрольный проход перед фиксацией результата — проверка кода на баги и качество независимым взглядом."
    discoverability: "Реализация завершена, требуется проверка перед деплоем/коммитом консенсуса."
    first_move: "Запустить /verify (сверка с эталоном Pack) и/или /code-review (баги, упрощение)."
    exit: "Critical-замечаний нет; High/Medium — решение пилота зафиксировано."
    boundary: "Не подменяет smoke-проверку — только статический анализ и сверку с эталоном."
    linked_artifact:
      - "skills-catalog:verify"
    source_ref:
      - file: ".claude/skills/code-review"
        section: "harness built-in skill, вне DS-каталога"

  LandingRegressionPass:
    description: "Зелёные тесты не гарантируют, что миграция или изменение корректно применилось к живой системе — нужна отдельная проверка после деплоя."
    discoverability: "После деплоя/миграции, где возможно расхождение тестового окружения и прод (БД, конфиг, внешний сервис)."
    first_move: "Проверить наблюдаемое поведение в целевой среде, не только exit-код тестов."
    exit: "Целевой инвариант подтверждён в реальной среде, не только в CI."
    boundary: "Не применяется к чисто локальным изменениям без внешнего эффекта."
    linked_artifact: []
    source_ref:
      - file: ".claude/rules/distinctions.md"
        section: "Различение «Тесты зелёные ≠ миграция корректна»"

  ProtocolResiduePass:
    description: "После закрытия РП в реестре/inbox остаются рассинхроны (drift) — регулярная сверка предотвращает накопление мусора."
    discoverability: "Close РП (done-статус) или периодическая гигиена (Day Open --deep-check, Week Close --semantic-check)."
    first_move: "Синхронно обновить контекст РП (inbox) и запись в реестре РП."
    exit: "Инвариант «контекст РП ↔ реестр РП обновлены синхронно» выполнен; производный индекс активных РП перегенерирован."
    boundary: "Не применяется к чистой правке текста без изменения статуса РП."
    linked_artifact: []
    source_ref:
      - file: "<governance-repo>/CLAUDE.md"

  # --- Процедуры (протокол верхнего уровня) ---

  CloseProtocol:
    description: "Каждый масштаб работы (сессия/день/неделя/месяц) закрывается зафиксированным протоколом — предотвращает незафиксированный результат."
    discoverability: "Триггерная фраза закрытия («закрывай», «всё») или календарное событие (конец дня/недели/месяца)."
    first_move: "Вызвать соответствующий скилл закрытия."
    exit: "Файл сессии/отчёта создан, git status чист по всем затронутым репо, push выполнен."
    boundary: "Не применяется, если сессия ≤15 мин без изменений файлов (искл. чеклист-верификация)."
    linked_artifact:
      - "skills-catalog:run-protocol"
      - "skills-catalog:day-close"
      - "skills-catalog:week-close"
      - "skills-catalog:month-close"
    source_ref:
      - file: "CLAUDE.md"
        section: "§2 ОРЗ-фрактал"

  CaptureToPack:
    description: "Знание, найденное в ходе работы (правило, паттерн, различение), требует явной маршрутизации в постоянное хранилище — иначе теряется после сессии."
    discoverability: "Рубеж работы (конец подзадачи, найдено решение/различение)."
    first_move: "Объявить «Capture: [что] → [куда]», определить маршрут (CLAUDE.md / Pack / DS docs / memory)."
    exit: "Знание записано в целевое место, ссылка зафиксирована."
    boundary: "Не применяется к эфемерному контексту текущей сессии (план, задачи в работе)."
    linked_artifact:
      - "skills-catalog:ke"
    source_ref:
      - file: "CLAUDE.md"
        section: "§2 Протокол Работы — Capture-to-Pack"

  DriftReporting:
    description: "Обнаруженное расхождение (файл не соответствует плану, устаревшее содержимое) не исправляется самовольно за пределами scope текущего хода — решение за пилотом."
    discoverability: "Найдено несоответствие вне scope текущего хода (проверяется git diff HEAD)."
    first_move: "Сформулировать: «Found drift: [что] в [файл]. Should I fix it?»"
    exit: "Пилот дал явное решение — фиксить сейчас или отложить."
    boundary: "Внутри scope текущего хода — не Drift Reporting, а Self-correction: фиксить сразу, без вопроса."
    linked_artifact: []
    source_ref:
      - file: "CLAUDE.md"
        section: "§2 Протокол Работы — Self-correction / AGENTS.md Drift Reporting"
