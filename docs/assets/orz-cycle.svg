<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="900" height="220" rx="16" fill="#12172b"/>

  <text x="450" y="38" text-anchor="middle" fill="#8fa3ff" font-size="14" letter-spacing="2" font-weight="600">THE SAME CYCLE, EVERY SCALE — SESSION · DAY · WEEK</text>

  <!-- Open -->
  <circle cx="150" cy="120" r="46" fill="none" stroke="#5b7fff" stroke-width="3"/>
  <text x="150" y="112" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Open</text>
  <text x="150" y="134" text-anchor="middle" fill="#9aa4c7" font-size="11">state the goal,</text>
  <text x="150" y="148" text-anchor="middle" fill="#9aa4c7" font-size="11">name the work</text>

  <!-- arrow 1 -->
  <line x1="200" y1="120" x2="300" y2="120" stroke="#3a4266" stroke-width="2"/>
  <polygon points="300,114 312,120 300,126" fill="#3a4266"/>

  <!-- Work -->
  <circle cx="450" cy="120" r="46" fill="none" stroke="#5b7fff" stroke-width="3"/>
  <text x="450" y="112" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Work</text>
  <text x="450" y="134" text-anchor="middle" fill="#9aa4c7" font-size="11">agent + human,</text>
  <text x="450" y="148" text-anchor="middle" fill="#9aa4c7" font-size="11">memory in the loop</text>

  <!-- arrow 2 -->
  <line x1="500" y1="120" x2="600" y2="120" stroke="#3a4266" stroke-width="2"/>
  <polygon points="600,114 612,120 600,126" fill="#3a4266"/>

  <!-- Close -->
  <circle cx="750" cy="120" r="46" fill="none" stroke="#5b7fff" stroke-width="3"/>
  <text x="750" y="112" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Close</text>
  <text x="750" y="134" text-anchor="middle" fill="#9aa4c7" font-size="11">capture what</text>
  <text x="750" y="148" text-anchor="middle" fill="#9aa4c7" font-size="11">was learned</text>

  <!-- return arrow -->
  <path d="M 750 175 C 750 200, 150 200, 150 175" fill="none" stroke="#3a4266" stroke-width="2" stroke-dasharray="4 4"/>
  <polygon points="144,178 150,168 156,178" fill="#3a4266"/>

  <text x="450" y="205" text-anchor="middle" fill="#5b6491" font-size="11">feeds the next Open — the protocol IWE runs on top of Claude Code</text>
</svg>
